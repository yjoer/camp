name: CI

on:
  pull_request:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-commit-msg:
    uses: ./.github/workflows/check-commit-msg.yml

  check-cpp:
    uses: ./.github/workflows/check-cpp.yml

  check-java:
    uses: ./.github/workflows/check-java.yml

  check-kt:
    uses: ./.github/workflows/check-kt.yml

  check-js:
    uses: ./.github/workflows/check-js.yml

  check-misc:
    uses: ./.github/workflows/check-misc.yml

  check-py:
    uses: ./.github/workflows/check-py.yml

  check-rs:
    uses: ./.github/workflows/check-rs.yml

  pytest:
    name: pytest
    runs-on: ubuntu-latest
    env:
      KERAS_BACKEND: torch
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.11'
      - name: Setup Rust
        run: rustup install 1.81.0
      - name: Setup uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57
        with:
          enable-cache: true
      - name: Setup Environment Variables
        run: cp .env.example .env
      - name: Install Pango
        run: sudo apt-get update && sudo apt-get install libpango1.0-dev
      - name: Install Dependencies
        run: uv sync --extra torch --extra torch-extras --extra vision
      - name: Test
        run: uv run pytest
