on:
  workflow_call:

jobs:
  cargo-fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Nightly Rustfmt
        run: rustup component add rustfmt --toolchain nightly
      - name: Check Versions
        run: |
          cargo --version
          cargo +nightly fmt --version
      - name: Format
        run: cargo +nightly fmt --all --check
