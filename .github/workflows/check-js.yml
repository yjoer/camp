on:
  workflow_call:

jobs:
  oxlint:
    name: oxlint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Enable Corepack
        run: corepack enable
      - name: Setup Vite Plus
        uses: voidzero-dev/setup-vp@e34774bccb4e7d7f2e23514ca980177a71425e43
        with:
          node-version: 24
          run-install: false
          cache: true
      - name: Install Dependencies
        # run: |
        #   if [ ${{ github.repository }} = "yjoer/camp" ]; then
        #     npm i --workspace @xcamp/config --include-workspace-root true
        #   else
        #     npm i --workspaces false --include-workspace-root true
        #   fi
        run: yarn install --immutable
      - name: Generate Types
        run: vp run -r gen-types
      - name: Oxlint
        run: vp lint
      - name: ESLint
        run: npx --no -- eslint --ext js,cjs,mjs,jsx,ts,tsx .
