[workspace]
channels = [ "conda-forge" ]
name = "xcling"
platforms = [ "win-64" ]
version = "2025.7.0"

[tasks.configure]
cmd = [
  "cmake",
  "-G",
  "Ninja",
  "-DCMAKE_C_COMPILER_LAUNCHER=ccache",
  "-DCMAKE_CXX_COMPILER_LAUNCHER=ccache",
  "-DOPENSSL_ROOT_DIR=$CONDA_PREFIX/Library",
  "-S",
  ".",
  "-B",
  ".build",
]

[tasks.build]
cmd = [ "ninja", "-C", ".build" ]
depends-on = [ "configure" ]

[tasks.start]
cmd = "./.build/xcling"

[dependencies]
nlohmann_json = "==3.12.0"
openssl = "==3.5.1"
xeus = "==5.2.3"
xeus-zmq = "==3.1.0"
